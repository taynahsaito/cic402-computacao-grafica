      //tentando com um circulo
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      const radialGradient = ctx.createRadialGradient(
        centerX,
        centerY,
        0,
        centerX,
        centerY,
        200, //o gradiente só vai até 200 - não vai preencher todo o circulo
      );
      radialGradient.addColorStop(0, "#ff6666");
      radialGradient.addColorStop(1, "#ffff99");

      ctx.fillStyle = radialGradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 300, 0, Math.PI * 2);
      ctx.fill();
